<style>
  html, body, #map {

  .topbar {

    z-index: 1000;
    top: 10px;
    left: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    pointer-events: none;
  }

  button {
    border: 0;
    border-radius: 10px;
    padding: 9px 12px;
    font-weight: 700;
    background: white;
    box-shadow: 0 2px 12px rgba(0,0,0,.30);
    pointer-events: auto;
    cursor: pointer;
    touch-action: manipulation;
  }

  button:active {
    transform: translateY(1px);
  }

  .status {
    position: absolute;
    left: 10px;
    bottom: 10px;
    z-index: 1000;
    background: rgba(255,255,255,.92);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);

  }

  .legend {

    left: 10px;
    bottom: 10px;
    z-index: 1000;
    background: rgba(255,255,255,.94);
    border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
    padding: 8px 10px;
    font-size: 12px;
    width: min(96vw, 430px);
  }

  .legend-title {
    font-weight: 900;

  }

  .legend-grid {

  .legend-row {

  .legend-swatch {

    font-size: 10px;

function propTable(props) {
  return '<table>' + Object.entries(props).map(([k,v]) =>
    '<tr><td><b>' + k + '</b></td><td>' + (v ?? '') + '</td></tr>'
  ).join('') + '</table>';
}

function haversineMeters(a, b) {
  const toRad = d => d * Math.PI / 180;
  const R = 6371000;
  const dLat = toRad(b.lat - a.lat);
  const dLng = toRad(b.lng - a.lng);
  const la1 = toRad(a.lat);
  const la2 = toRad(b.lat);
  const h = Math.sin(dLat / 2) ** 2 +
            Math.cos(la1) * Math.cos(la2) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

function bearingDegrees(a, b) {
  const toRad = d => d * Math.PI / 180;
  const toDeg = r => r * 180 / Math.PI;
  const la1 = toRad(a.lat);
  const la2 = toRad(b.lat);
  const dLng = toRad(b.lng - a.lng);
  const y = Math.sin(dLng) * Math.cos(la2);
  const x = Math.cos(la1) * Math.sin(la2) - Math.sin(la1) * Math.cos(la2) * Math.cos(dLng);
  return (toDeg(Math.atan2(y, x)) + 360) % 360;
}

function formatDistance(meters) {
  if (meters < 1000) return Math.round(meters) + ' m';
  return (meters / 1000).toFixed(2) + ' km';
}

    navLine = null;
  }
  if (navArrowMarker) {
    map.removeLayer(navArrowMarker);
    navArrowMarker = null;
  }
}

function renderNavGuide(fitView) {
  if (!navTarget) return;

  if (!navTargetMarker) {
    navTargetMarker = L.circleMarker(navTarget, {
      radius: 8,
      color: '#0047ff',
      weight: 3,
      fillColor: '#ffffff',
      fillOpacity: 1
    }).addTo(map).bindPopup('Navigationsziel');
  } else {
    navTargetMarker.setLatLng(navTarget);
  }

  const userPos = gpsMarker ? gpsMarker.getLatLng() : null;
  if (!userPos) {
    clearNavGuide();
    setStatus('Ziel markiert. Für Richtungs-Pfeil bitte GPS aktivieren.');
    if (fitView) map.setView(navTarget, Math.max(map.getZoom(), 18));
    return;
  }

  const distance = haversineMeters(userPos, navTarget);
  const bearing = bearingDegrees(userPos, navTarget);
  const mid = L.latLng((userPos.lat + navTarget.lat) / 2, (userPos.lng + navTarget.lng) / 2);

  if (!navLine) {
    navLine = L.polyline([userPos, navTarget], {
      color: '#0047ff',
      weight: 3,
      opacity: 0.9,
      dashArray: '10 8'
    }).addTo(map);
  } else {
    navLine.setLatLngs([userPos, navTarget]);
  }

  const arrowIcon = L.divIcon({
    className: '',
    html: `<div class="nav-dir-arrow" style="transform: rotate(${bearing}deg);">➤</div>`,
    iconSize: [34, 34],
    iconAnchor: [17, 17]
  });

  if (!navArrowMarker) {
    navArrowMarker = L.marker(mid, { icon: arrowIcon, interactive: false }).addTo(map);
  } else {
    navArrowMarker.setLatLng(mid);
    navArrowMarker.setIcon(arrowIcon);
  }

  if (fitView) map.fitBounds(L.latLngBounds([userPos, navTarget]).pad(0.25));
  setStatus('Richtung aktiv: ' + formatDistance(distance) + ' | Kurs ' + Math.round(bearing) + '°');
}

function startFieldNavigation(lat, lng) {
  navTarget = L.latLng(lat, lng);
  renderNavGuide(true);

  if (navigator.geolocation && !gpsMarker) {
    navigator.geolocation.getCurrentPosition(updatePosition, gpsError, {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 15000
    });
  }
}

function navButtonHtml(lat, lng) {
  if (typeof lat !== 'number' || typeof lng !== 'number') return '';
  return `<br><br><button class="nav-btn" onclick="startFieldNavigation(${lat}, ${lng})">Richtung anzeigen</button>`;
}

function hashColor(str) {
  let h = 0;
  str = String(str ?? '');
  for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h << 5) - h);
  const hue = Math.abs(h) % 360;
  return `hsl(${hue}, 75%, 52%)`;
}

function featureCenter(layer) {
  try {
    return layer.getBounds().getCenter();
  } catch(e) {
    if (layer.getLatLng) return layer.getLatLng();
    return null;
  }
}

function makeLabelIcon(text, className, angleDeg) {
  const hasAngle = typeof angleDeg === 'number';
  const html = hasAngle
    ? `<div class="${className}" style="transform: rotate(${angleDeg}deg); transform-origin: center center;">${text}</div>`
    : text;
  return L.divIcon({
    className: hasAngle ? '' : className,
    html: html,
    iconSize: null,
    iconAnchor: [0, 0]
  });
}

function addLabel(targetGroup, layer, text, className, angleDeg) {
  const c = featureCenter(layer);
  if (!c || !text) return null;
  return L.marker(c, { icon: makeLabelIcon(text, className, angleDeg), interactive: false }).addTo(targetGroup);
}

function lineEndpoints(layer) {
  const latlngs = layer.getLatLngs ? layer.getLatLngs() : null;
  if (!latlngs || !latlngs.length) return null;
  const points = Array.isArray(latlngs[0]) ? latlngs[0] : latlngs;
  if (!points || points.length < 2) return null;
  return { a: points[0], b: points[points.length - 1] };
}

function normalizeLabelAngle(angleDeg) {
  let a = angleDeg;
  while (a > 90) a -= 180;
  while (a < -90) a += 180;
  return a;
}

function offsetLatLngMeters(latlng, eastMeters, northMeters) {
  const latRad = latlng.lat * Math.PI / 180;
  const dLat = (northMeters / 6378137) * (180 / Math.PI);
  const dLng = (eastMeters / (6378137 * Math.cos(latRad))) * (180 / Math.PI);
  return L.latLng(latlng.lat + dLat, latlng.lng + dLng);
}

function interpolateLatLng(a, b, t) {
  return L.latLng(a.lat + (b.lat - a.lat) * t, a.lng + (b.lng - a.lng) * t);
}

function toLocalMeters(origin, latlng) {
  const latRad = origin.lat * Math.PI / 180;
  const x = (latlng.lng - origin.lng) * (Math.PI / 180) * 6378137 * Math.cos(latRad);
  const y = (latlng.lat - origin.lat) * (Math.PI / 180) * 6378137;
  return { x, y };
}

function fromLocalMeters(origin, point) {
  const latRad = origin.lat * Math.PI / 180;
  const lat = origin.lat + (point.y / 6378137) * (180 / Math.PI);
  const lng = origin.lng + (point.x / (6378137 * Math.cos(latRad))) * (180 / Math.PI);
  return L.latLng(lat, lng);
}

const bounds = L.latLngBounds([]);

const bereichLabels = L.layerGroup();
const bereicheLayer = L.geoJSON(bereicheData, {
  style: f => {
    const col = hashColor(f.properties.BZCH || f.properties.id);
    return { color: col, weight: 2, opacity: .95, fillColor: col, fillOpacity: .22 };
  },
  onEachFeature: (f, layer) => {
    layer.bindPopup('<b>Bereich ' + (f.properties.BZCH ?? '') + '</b><br>' + propTable(f.properties));
    addLabel(bereichLabels, layer, f.properties.BZCH, 'label');
    try { bounds.extend(layer.getBounds()); } catch(e) {}
  }
}).addTo(map);
bereichLabels.addTo(map);

const kranLabels = L.layerGroup();
const kranLayer = L.geoJSON(kranData, {
  style: f => { return { color: '#ff0000', weight: 2, opacity: 1, fillColor: '#ff0000', fillOpacity: .08 }; },
  onEachFeature: (f, layer) => {
    const target = featureCenter(layer);
    const navButton = target ? navButtonHtml(target.lat, target.lng) : '';
    layer.bindPopup('<b>Kranstandort ' + (f.properties.id ?? '') + '</b><br>' + propTable(f.properties) + navButton);
    addLabel(kranLabels, layer, 'K' + (f.properties.id ?? ''), 'label-kran');
    try { bounds.extend(layer.getBounds()); } catch(e) {}
  }
}).addTo(map);
kranLabels.addTo(map);

const kranCenterLayer = L.geoJSON(kranCentersData, {
  pointToLayer: (f, latlng) => L.circleMarker(latlng, {
    radius: 6,
    color: '#000',
    weight: 2,
    fillColor: '#ffff00',
    fillOpacity: 1
  }),
  onEachFeature: (f, layer) => {
    layer.bindPopup('<b>Mittelpunkt Kranradius K' + (f.properties.id ?? '') + '</b><br>' + propTable(f.properties));
  }
}).addTo(map);

const tableLabels = L.layerGroup();
const tableTypeFillLayer = L.layerGroup();
const tableTypeHatchLayer = L.layerGroup();
const tableIndex = new Map();
let tableLabelsVisible = true;

function tableStyle(f) {
  return { color: '#000000', weight: 2, opacity: .95 };
}

function buildTableLabel(idKey, type) {
  return idKey + ' - ' + String(type ?? '');
}

function buildTablePopupHtml(name, label, props, target) {
  const navButton = target ? navButtonHtml(target.lat, target.lng) : '';
  return '<b>' + name + ' | ' + label + '</b><br>' + propTable(props) + navButton;
}

function tableTypeColor(typeText) {
  const base = String(typeText || '').charAt(0).toUpperCase();
  const palette = {
    'A': '#2a9d8f',
    'B': '#1d4ed8',
    'C': '#f59e0b',
    'D': '#dc2626',
    'E': '#6b7280'
  };
  return palette[base] || '#111111';
}

function tableHatchSide(typeText) {
  const t = String(typeText || '').toUpperCase();
  if (t.endsWith('_2025')) return 'right';
  if (t.endsWith('_KF2025')) return 'left';
  return '';
}

function addTableTypeVisuals(layer, typeText, thicknessMeters) {
  const line = lineEndpoints(layer);
  if (!line) return;

  const heading = typeof layer.feature?.properties?.tisch_ausrichtung === 'number'
    ? layer.feature.properties.tisch_ausrichtung
    : bearingDegrees(line.a, line.b);
  const rad = heading * Math.PI / 180;
  const backEast = -Math.sin(rad) * thicknessMeters;
  const backNorth = -Math.cos(rad) * thicknessMeters;

  const aBack = offsetLatLngMeters(line.a, backEast, backNorth);
  const bBack = offsetLatLngMeters(line.b, backEast, backNorth);
  const rect = [line.a, line.b, bBack, aBack];

  const color = tableTypeColor(typeText);
  L.polygon(rect, {
    stroke: false,
    fillColor: color,
    fillOpacity: 0.28,
    interactive: false
  }).addTo(tableTypeFillLayer);

  const side = tableHatchSide(typeText);
  if (!side) return;

  const center = featureCenter(layer);
  if (!center) return;
  const polyLocal = rect.map(pt => toLocalMeters(center, pt));
  const slope = side === 'right' ? 1 : -1;
  const lineSpacing = 0.9;

  const bValues = polyLocal.map(p => p.y - slope * p.x);
  const bMin = Math.min(...bValues);
  const bMax = Math.max(...bValues);

  for (let b = bMin - 1; b <= bMax + 1; b += lineSpacing) {
    const intersections = [];
    for (let i = 0; i < polyLocal.length; i++) {
      const p = polyLocal[i];
      const q = polyLocal[(i + 1) % polyLocal.length];
      const dx = q.x - p.x;
      const dy = q.y - p.y;
      const denominator = dy - slope * dx;
      if (Math.abs(denominator) < 1e-9) continue;
      const t = (b - (p.y - slope * p.x)) / denominator;
      if (t < 0 || t > 1) continue;
      intersections.push({ x: p.x + t * dx, y: p.y + t * dy });
    }
    if (intersections.length < 2) continue;
    intersections.sort((u, v) => u.x - v.x || u.y - v.y);
    const p1 = intersections[0];
    const p2 = intersections[intersections.length - 1];
    L.polyline([fromLocalMeters(center, p1), fromLocalMeters(center, p2)], {
      color: '#111111',
      weight: 1,
      opacity: 0.65,
      interactive: false
    }).addTo(tableTypeHatchLayer);
  }
}

function addTableLayer(data, name) {
  return L.geoJSON(data, {
    style: tableStyle,
    onEachFeature: (f, layer) => {
      const p = f.properties || {};
      const idKey = String(p.id ?? '').trim();
      const label = buildTableLabel(idKey, p.tisch_typ);
      const target = featureCenter(layer);
      layer.bindPopup(buildTablePopupHtml(name, label, p, target));
      if (idKey) tableIndex.set(idKey, { layer, feature: f, name, label });
      const line = lineEndpoints(layer);
      const labelBearing = line ? bearingDegrees(line.a, line.b) : 90;
      const labelAngle = normalizeLabelAngle(labelBearing - 90);
      addLabel(tableLabels, layer, label, 'label-table', labelAngle);
      addTableTypeVisuals(layer, p.tisch_typ, 3);
      try { bounds.extend(layer.getBounds()); } catch(e) {}
    }
  }).addTo(map);
}

const pz1Layer = addTableLayer(pz1Data, 'PZ1');
const pz2Layer = addTableLayer(pz2Data, 'PZ2');
const pz2025Layer = addTableLayer(pz2025Data, 'PZ2025');
tableTypeFillLayer.addTo(map);
tableTypeHatchLayer.addTo(map);
tableLabels.addTo(map);

const layerGroups = [
  {
    title: 'Kartenhintergrund',
    type: 'base',
    layers: [
      { name: 'swisstopo SWISSIMAGE', layer: swisstopo },
      { name: 'Esri Satellit', layer: esriSat },
      { name: 'OpenStreetMap', layer: osm }
    ]
  },
  {
    title: 'Bereiche',
    type: 'overlay',
    groupToggle: true,
    layers: [
      { name: 'Bereiche farbig', layer: bereicheLayer },
      { name: 'Beschriftung BZCH', layer: bereichLabels }
    ]
  },
  {
    title: 'Modultische',
    type: 'overlay',
    groupToggle: true,
    layers: [
      { name: 'PZ1 Modultische', layer: pz1Layer },
      { name: 'PZ2 Modultische', layer: pz2Layer },
      { name: 'PZ2025 Modultische', layer: pz2025Layer },
      { name: 'Typ-Flaechen', layer: tableTypeFillLayer },
      { name: 'Typ-Schraffur', layer: tableTypeHatchLayer },
      { name: 'Beschriftung ID - Typ', layer: tableLabels }
    ]
  },
  {
    title: 'Kranstandorte',
    type: 'overlay',
    groupToggle: true,
    layers: [
      { name: 'Kranradien 2026', layer: kranLayer },
      { name: 'Kran Labels', layer: kranLabels },
      { name: 'Mittelpunkte Kranradien', layer: kranCenterLayer }
    ]
  }
];

function createGroupedLayerControl(groups) {
  const Control = L.Control.extend({
    options: { position: 'topright' },
    onAdd: function() {
      const container = L.DomUtil.create('div', 'grouped-layer-control collapsed');
      L.DomEvent.disableClickPropagation(container);
      L.DomEvent.disableScrollPropagation(container);

      const header = L.DomUtil.create('button', 'layer-header', container);
      header.type = 'button';
      header.innerHTML = '<span>Layer</span><span class="layer-toggle">+</span>';

      const body = L.DomUtil.create('div', 'layer-body', container);

      header.addEventListener('click', () => {
        container.classList.toggle('collapsed');
        header.querySelector('.layer-toggle').textContent = container.classList.contains('collapsed') ? '+' : '−';
      });

      groups.forEach(group => {
        const groupEl = L.DomUtil.create('div', 'layer-group', body);
        const title = L.DomUtil.create('div', 'layer-group-title', groupEl);
        title.textContent = group.title;

        if (group.type === 'overlay' && group.groupToggle) {
          const row = L.DomUtil.create('label', 'layer-row', groupEl);
          const input = L.DomUtil.create('input', '', row);
          input.type = 'checkbox';
          input.name = 'overlay-group-' + group.title;
          input.checked = group.layers.some(item => map.hasLayer(item.layer));

          const text = L.DomUtil.create('span', '', row);
          text.textContent = 'Anzeigen';

          input.addEventListener('change', () => {
            group.layers.forEach(item => {
              if (input.checked) map.addLayer(item.layer);
              else map.removeLayer(item.layer);
            });
          });
          return;
        }

        group.layers.forEach(item => {
          const row = L.DomUtil.create('label', 'layer-row', groupEl);
          const input = L.DomUtil.create('input', '', row);
          input.type = group.type === 'base' ? 'radio' : 'checkbox';
          input.name = group.type === 'base' ? 'base-map' : 'overlay-' + group.title;
          input.checked = map.hasLayer(item.layer);

          const text = L.DomUtil.create('span', '', row);
          text.textContent = item.name;

          input.addEventListener('change', () => {
            if (group.type === 'base') {
              groups.filter(g => g.type === 'base').forEach(g => {
                g.layers.forEach(base => {
                  if (base.layer !== item.layer && map.hasLayer(base.layer)) map.removeLayer(base.layer);
                });
              });
              if (!map.hasLayer(item.layer)) map.addLayer(item.layer);
            } else {
              if (input.checked) map.addLayer(item.layer);
              else map.removeLayer(item.layer);
            }
          });
        });
      });

      return container;
    }
  });
  return new Control();
}

createGroupedLayerControl(layerGroups).addTo(map);

function searchTableId() {
  const input = document.getElementById('tableSearch');
  const id = String(input.value || '').trim();
  if (!id) {
    setStatus('Keine Tisch-ID eingegeben');
    return;
  }

  const hit = tableIndex.get(id);
  if (!hit) {
    setStatus('Tisch-ID nicht gefunden: ' + id);
    input.select();
    return;
  }

  if (!map.hasLayer(hit.layer)) map.addLayer(hit.layer);
  if (!map.hasLayer(tableLabels) && tableLabelsVisible) map.addLayer(tableLabels);

  const target = featureCenter(hit.layer);
  if (target) map.setView(target, Math.max(map.getZoom(), 20));
  hit.layer.openPopup();
  setStatus('Gefunden: ' + hit.name + ' | ' + hit.label);
}

if (bounds.isValid()) map.fitBounds(bounds.pad(0.05));

let watchId = null;
let follow = false;
let gpsMarker = null;
let gpsCircle = null;

function updatePosition(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const acc = pos.coords.accuracy;

  if (!gpsMarker) {
    gpsMarker = L.circleMarker([lat, lng], {
      radius: 7,
      color: '#0057ff',
      weight: 3,
      fillColor: '#ffffff',
      fillOpacity: 1
    }).addTo(map).bindPopup('Mein Standort');
    gpsCircle = L.circle([lat, lng], {
      radius: acc,
      color: '#0057ff',
      weight: 1,
      fillOpacity: .08
    }).addTo(map);
  } else {
    gpsMarker.setLatLng([lat, lng]);
    gpsCircle.setLatLng([lat, lng]);
    gpsCircle.setRadius(acc);
  }

  if (follow) map.setView([lat, lng], Math.max(map.getZoom(), 18));
  if (navTarget) renderNavGuide(false);
  setStatus('GPS aktiv. Genauigkeit ca. ' + Math.round(acc) + ' m');
}

function gpsError(err) {
  setStatus('GPS Fehler: ' + err.message);
}

function toggleGps() {
  if (!navigator.geolocation) {
    setStatus('GPS wird von diesem Browser nicht unterstützt');
    return;
  }

  follow = !follow;

  if (watchId === null) {
    navigator.geolocation.getCurrentPosition(updatePosition, gpsError, {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 15000
    });
    watchId = navigator.geolocation.watchPosition(updatePosition, gpsError, {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 15000
    });
  }

  setStatus(follow ? 'GPS Follow an' : 'GPS aktiv, Follow aus');
}

function zoomAll() {
  if (bounds.isValid()) {
    map.fitBounds(bounds.pad(0.05));
    setStatus('Alle Layer angezeigt');
  } else {
    setStatus('Keine gültigen Geometrien gefunden');
  }
}

function toggleTableLabels() {
  if (tableLabelsVisible) {
    map.removeLayer(tableLabels);
    tableLabelsVisible = false;
    setStatus('Tisch-Labels aus');
  } else {
    map.addLayer(tableLabels);
    tableLabelsVisible = true;
    setStatus('Tisch-Labels an');
  }
}

document.getElementById('gpsBtn').addEventListener('click', toggleGps);
document.getElementById('allBtn').addEventListener('click', zoomAll);
document.getElementById('tableBtn').addEventListener('click', toggleTableLabels);

setStatus(
  'Geladen: ' +
  bereicheData.features.length + ' Bereiche, ' +
  (pz1Data.features.length + pz2Data.features.length + pz2025Data.features.length) + ' Modultische, ' +
  kranData.features.length + ' Kranstandorte 2026'
);
</script>
