    const map = L.map('map', {
      zoomControl: true
    }).setView([46.63735, 8.76798], 17);

    const esriSatellite = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        maxZoom: 19,
        attribution: 'Tiles © Esri'
      }
    );

    const osm = L.tileLayer(
      'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
      {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }
    );

    esriSatellite.addTo(map);

    L.control.layers({
      'Satellit': esriSatellite,
      'OpenStreetMap': osm
    }).addTo(map);

    const kranLayer = L.geoJSON(kranstandorte, {
      style: function(feature) {
        return {
          color: '#ff0000',
          weight: 2,
          fillColor: '#ff0000',
          fillOpacity: 0.22
        };
      },
      onEachFeature: function(feature, layer) {
        const p = feature.properties || {};
        layer.bindPopup(`
          <b>Kranstandort ${p.id ?? ''}</b><br>
          Bereich: ${p.Bereich ?? ''}<br>
          Jahr: ${p.JAHR ?? ''}<br>
          MT: ${p.MT ?? ''}<br>
          A: ${p.A ?? 0} | B: ${p.B ?? 0} | C: ${p.C ?? 0} | D: ${p.D ?? 0} | E: ${p.E ?? 0}
        `);
      }
    }).addTo(map);

    function fitKran() {
      map.fitBounds(kranLayer.getBounds(), { padding: [30, 30] });
    }

    fitKran();

    let gpsMarker = null;
    let gpsCircle = null;
    let watchId = null;
    let followGps = true;

    function toggleFollow() {
      followGps = !followGps;
      document.getElementById('followState').textContent = followGps ? 'ein' : 'aus';
    }

    function startGps() {
      if (!navigator.geolocation) {
        document.getElementById('status').textContent = 'Dieses Gerät unterstützt kein GPS im Browser.';
        return;
      }

      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      document.getElementById('status').textContent = 'GPS wird gesucht...';

      watchId = navigator.geolocation.watchPosition(
        function(pos) {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const acc = pos.coords.accuracy;

          const ll = [lat, lon];

          if (!gpsMarker) {
            gpsMarker = L.marker(ll).addTo(map).bindPopup('Mein Standort');
          } else {
            gpsMarker.setLatLng(ll);
          }

          if (!gpsCircle) {
            gpsCircle = L.circle(ll, {
              radius: acc,
              color: '#0066ff',
              weight: 2,
              fillColor: '#0066ff',
              fillOpacity: 0.12
            }).addTo(map);
          } else {
            gpsCircle.setLatLng(ll);
            gpsCircle.setRadius(acc);
          }

          document.getElementById('status').textContent =
            `GPS: ±${Math.round(acc)} m | ${lat.toFixed(6)}, ${lon.toFixed(6)}`;

          if (followGps) {
            map.setView(ll, Math.max(map.getZoom(), 18));
          }
        },
        function(err) {
          document.getElementById('status').textContent = 'GPS Fehler: ' + err.message;
        },
        {
          enableHighAccuracy: true,
          maximumAge: 1000,
          timeout: 15000
        }
      );
    }
