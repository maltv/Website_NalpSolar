const map = L.map('map', { zoomControl:true, maxZoom:22 });

const swissimage = L.tileLayer(
  'https://wmts.geo.admin.ch/1.0.0/ch.swisstopo.swissimage/default/current/3857/{z}/{x}/{y}.jpeg',
  { attribution:'© swisstopo', maxZoom:22, maxNativeZoom:20, tileSize:256 }
);

const esri = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { attribution:'Tiles © Esri', maxZoom:22, maxNativeZoom:19 }
);

const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution:'© OpenStreetMap', maxZoom:22, maxNativeZoom:19 }
);

swissimage.addTo(map);
L.control.layers({ 'swisstopo SWISSIMAGE': swissimage, 'Esri Satellit': esri, 'OpenStreetMap': osm }, {}, { collapsed:true }).addTo(map);

function popupText(p) {
  return `<b>Kran ${p.id}</b><br>` +
         `Bereich: ${p.Bereich ?? ''}<br>` +
         `Jahr: ${p.JAHR ?? ''}<br>` +
         `MT: ${p.MT ?? ''}<br>` +
         `A:${p.A ?? 0} B:${p.B ?? 0} C:${p.C ?? 0} D:${p.D ?? 0} E:${p.E ?? 0}`;
}

const areas = L.geoJSON(kranPolygone, {
  style: { color:'#ffcc00', weight:3, opacity:1, fillColor:'#ffcc00', fillOpacity:.22 },
  onEachFeature: (feature, layer) => layer.bindPopup(popupText(feature.properties || {}))
}).addTo(map);

const labels = L.geoJSON(kranPunkte, {
  pointToLayer: (feature, latlng) => L.marker(latlng, {
    icon: L.divIcon({ className:'crane-label', html:`K${feature.properties.id}`, iconSize:null })
  }).bindPopup(popupText(feature.properties || {}))
}).addTo(map);

const bounds = areas.getBounds();
if (bounds.isValid()) map.fitBounds(bounds.pad(0.25));

let gpsMarker = null;
let gpsCircle = null;
let watchId = null;
let follow = false;
const statusEl = document.getElementById('status');

function setStatus(t) { statusEl.textContent = t; }

function updatePosition(pos) {
  const latlng = [pos.coords.latitude, pos.coords.longitude];
  const acc = pos.coords.accuracy || 0;
  if (!gpsMarker) {
    gpsMarker = L.marker(latlng).addTo(map).bindPopup('Mein Standort');
    gpsCircle = L.circle(latlng, { radius: acc, color:'#1e88e5', weight:2, fillOpacity:.12 }).addTo(map);
  } else {
    gpsMarker.setLatLng(latlng);
    gpsCircle.setLatLng(latlng).setRadius(acc);
  }
  setStatus(`GPS aktiv, Genauigkeit ca. ${Math.round(acc)} m`);
  if (follow) map.setView(latlng, Math.max(map.getZoom(), 18));
}

function gpsError(err) {
  setStatus('GPS Fehler: ' + err.message);
}

document.getElementById('gpsBtn').addEventListener('click', () => {
  if (!navigator.geolocation) { setStatus('GPS wird von diesem Browser nicht unterstützt'); return; }
  follow = !follow;
  if (watchId === null) {
    watchId = navigator.geolocation.watchPosition(updatePosition, gpsError, {
      enableHighAccuracy:true, maximumAge:1000, timeout:15000
    });
  }
  setStatus(follow ? 'GPS Follow an' : 'GPS aktiv, Follow aus');
});

document.getElementById('allBtn').addEventListener('click', () => {
  if (bounds.isValid()) map.fitBounds(bounds.pad(0.25));
});
</script>
